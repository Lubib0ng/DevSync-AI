name: Deploy DevSync AI

on:
  push:
    branches:
      - main          # main 브랜치에 push 될 때 자동 실행
  pull_request:
    branches:
      - main          # PR 생성 시 빌드 검증만 실행

jobs:
  # ── 1. 프론트엔드 빌드 검증 ──────────────────────────────
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: devsync-ai/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: devsync-ai

      - name: Build
        run: npm run build
        working-directory: devsync-ai
        env:
          CI: false   # ESLint 경고를 에러로 처리하지 않음

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: devsync-ai/build
          retention-days: 1

  # ── 2. 백엔드 검증 ───────────────────────────────────────
  build-backend:
    name: Validate Python Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx beautifulsoup4 \
                      anthropic groq google-genai \
                      python-dotenv pydantic

      - name: Syntax check
        run: python -m py_compile backend/main.py

  # ── 3. Vercel 배포 (프론트) ──────────────────────────────
  deploy-frontend:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: devsync-ai
          vercel-args: '--prod'

  # ── 4. Render 배포 (백엔드) ──────────────────────────────
  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
