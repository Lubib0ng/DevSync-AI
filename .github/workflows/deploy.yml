name: Deploy DevSync AI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── 1. 프론트엔드 빌드 검증 ──────────────────────────────
  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: devsync-ai/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: devsync-ai

      - name: Build
        run: npm run build
        working-directory: devsync-ai
        env:
          CI: false

  # ── 2. 백엔드 검증 ───────────────────────────────────────
  build-backend:
    name: Validate Python Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn httpx beautifulsoup4 \
                      anthropic groq google-genai \
                      python-dotenv pydantic

      - name: Syntax check
        run: python -m py_compile backend/main.py

  # ── 3. Render 배포 (백엔드) ──────────────────────────────
  deploy-backend:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "::warning::Render deploy hook returned $RESPONSE. Set RENDER_DEPLOY_HOOK_URL in GitHub Secrets."
          fi
